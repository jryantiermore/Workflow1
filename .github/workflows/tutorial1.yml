name: tutorial1
on: push

jobs:
    job1: #this is the job ID that ends up being used in the needs condition below
        name: job1
        runs-on: ubuntu-latest
        steps:
        - name: setup python
          uses: actions/setup-python@v6 
          with:
            python-version: 3.12
        - name: check version of python
          run: python --version
        - name: check ver of pip
          run: pip --version
    job2:
        name: job2
        runs-on: windows-latest
        steps:
        - name: step2
          run:
            echo "hello from job2"
            echo "April 26th 2026"
    job3:
        name: job3
        runs-on: ubuntu-latest
        steps:
        - name: step3
          run: 
            echo "hello from job3"
            echo "April 25th 2026"
    job4:
        name: job4
        runs-on: ubuntu-latest
        needs: [job1, job2]
        steps:
        - name: step4
          run: echo "I am job 4"
          
